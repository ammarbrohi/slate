server {
  listen 8080;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # SPA: real paths (/b/:id, /p/:slug, /sign-in, ...) fall back to index.html
  location / {
    try_files $uri $uri/ /index.html;
  }

  # bust the service worker the moment a new bundle ships
  location = /index.html {
    add_header Cache-Control "no-store";
  }

  gzip on;
  gzip_types text/css application/javascript application/json image/svg+xml;
}
