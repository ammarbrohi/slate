# Production stack: sync server + Postgres + MinIO (S3-compatible file store).
# All persistent data is bind-mounted under ./data so it lives on the host drive.
# Copy .env.example -> .env and fill secrets before `docker compose up -d`.

services:
  server:
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      PORT: 3002
      CORS_ORIGIN: ${CORS_ORIGIN}
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      MAX_FAILED_ATTEMPTS: ${MAX_FAILED_ATTEMPTS:-5}
      LOCKOUT_MINUTES: ${LOCKOUT_MINUTES:-15}
      # MinIO over the internal docker network
      S3_ENDPOINT: http://minio:9000
      S3_REGION: ${S3_REGION:-auto}
      S3_BUCKET: ${S3_BUCKET:-excalidraw-files}
      S3_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      S3_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      S3_FORCE_PATH_STYLE: "true"
      AUTH_DEV_BYPASS: ${AUTH_DEV_BYPASS:-false}
      CLERK_ISSUER: ${CLERK_ISSUER}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY:-}
    ports:
      - "${SERVER_PORT:-3002}:3002"

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2025-04-08T15-41-24Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - ./data/minio:/data
    ports:
      # console only; the API (9000) stays internal to the docker network
      - "127.0.0.1:9001:9001"

  # one-shot: wait for MinIO, create the bucket, then exit
  minio-init:
    image: minio/mc:RELEASE.2025-04-08T15-39-49Z
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD}; do echo 'waiting for minio...'; sleep 2; done;
      mc mb -p local/${S3_BUCKET:-excalidraw-files};
      mc anonymous set none local/${S3_BUCKET:-excalidraw-files};
      exit 0;
      "
